name: Build Baynana v6 APK

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore tested v2 project
        run: bash build-input/build-v2.sh

      - name: Apply bold friendly challenge edition
        run: |
          rm -rf BaynanaAndroid/app/src/main/java/com/baynana/couplesgame
          mkdir -p BaynanaAndroid/app/src/main/java/com/baynana
          cp -R overlay/app/src/main/java/com/baynana/couplesgame BaynanaAndroid/app/src/main/java/com/baynana/
          rm -rf BaynanaAndroid/app/src/test/java/com/baynana/couplesgame
          mkdir -p BaynanaAndroid/app/src/test/java/com/baynana
          cp -R overlay/app/src/test/java/com/baynana/couplesgame BaynanaAndroid/app/src/test/java/com/baynana/
          python3 - <<'PY'
          from pathlib import Path
          import re

          project = Path('BaynanaAndroid')
          app = project / 'app/src/main/java/com/baynana/couplesgame/BaynanaApp.kt'
          text = app.read_text(encoding='utf-8')
          text = text.replace('import androidx.compose.foundation.layout.weight\n', '')
          text = text.replace(
              'AnimatedContent(\n            targetState = currentIndex,',
              'AnimatedContent(\n            targetState = currentIndex,\n            modifier = Modifier.weight(1f).fillMaxWidth(),'
          )
          text = text.replace(
              'Modifier.fillMaxWidth().weight(1f).scale(glow)',
              'Modifier.fillMaxSize().scale(glow)'
          )
          app.write_text(text, encoding='utf-8')

          gradle = project / 'app/build.gradle.kts'
          g = gradle.read_text(encoding='utf-8')
          g = re.sub(r'versionCode\s*=\s*\d+', 'versionCode = 6', g)
          g = re.sub(r'versionName\s*=\s*"[^"]+"', 'versionName = "0.6.0"', g)
          g = g.replace('jvmTarget = "11"', 'jvmTarget = "17"')
          g = g.replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17')
          gradle.write_text(g, encoding='utf-8')

          values = project / 'app/src/main/res/values'
          drawable = project / 'app/src/main/res/drawable'
          mip = project / 'app/src/main/res/mipmap-anydpi'
          mip26 = project / 'app/src/main/res/mipmap-anydpi-v26'
          mip33 = project / 'app/src/main/res/mipmap-anydpi-v33'
          for directory in (values, drawable, mip, mip26, mip33):
              directory.mkdir(parents=True, exist_ok=True)

          (values / 'strings.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">بيننا</string></resources>
          ''', encoding='utf-8')
          (values / 'colors.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>
          <resources><color name="icon_background">#5E1237</color></resources>
          ''', encoding='utf-8')
          (values / 'styles.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.Baynana" parent="android:style/Theme.Material.Light.NoActionBar">
              <item name="android:fontFamily">sans</item>
              <item name="android:windowLightStatusBar">false</item>
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
            </style>
          </resources>
          ''', encoding='utf-8')

          foreground = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFF8F2" android:pathData="M15,28 C15,20 21,14 29,14 H57 C65,14 71,20 71,28 V48 C71,56 65,62 57,62 H43 L29,75 L32,62 H29 C21,62 15,56 15,48 Z"/>
            <path android:fillColor="#F0A0B7" android:pathData="M38,39 C38,31 44,25 52,25 H79 C87,25 93,31 93,39 V59 C93,67 87,73 79,73 H76 L80,86 L65,73 H52 C44,73 38,67 38,59 Z"/>
            <path android:fillColor="#F6C86E" android:pathData="M55,42 C51,36 42,39 42,48 C42,57 55,66 55,66 C55,66 68,57 68,48 C68,39 59,36 55,42 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M82,17 L85,24 L92,27 L85,30 L82,37 L79,30 L72,27 L79,24 Z"/>
          </vector>'''
          monochrome = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFFFFFFF" android:pathData="M15,28 C15,20 21,14 29,14 H57 C65,14 71,20 71,28 V48 C71,56 65,62 57,62 H43 L29,75 L32,62 H29 C21,62 15,56 15,48 Z M38,39 C38,31 44,25 52,25 H79 C87,25 93,31 93,39 V59 C93,67 87,73 79,73 H76 L80,86 L65,73 H52 C44,73 38,67 38,59 Z M55,42 C51,36 42,39 42,48 C42,57 55,66 55,66 C55,66 68,57 68,48 C68,39 59,36 55,42 Z"/>
          </vector>'''
          legacy = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#5E1237" android:pathData="M12,4 H96 C101,4 104,7 104,12 V96 C104,101 101,104 96,104 H12 C7,104 4,101 4,96 V12 C4,7 7,4 12,4 Z"/>
            <path android:fillColor="#FFF8F2" android:pathData="M15,28 C15,20 21,14 29,14 H57 C65,14 71,20 71,28 V48 C71,56 65,62 57,62 H43 L29,75 L32,62 H29 C21,62 15,56 15,48 Z"/>
            <path android:fillColor="#F0A0B7" android:pathData="M38,39 C38,31 44,25 52,25 H79 C87,25 93,31 93,39 V59 C93,67 87,73 79,73 H76 L80,86 L65,73 H52 C44,73 38,67 38,59 Z"/>
            <path android:fillColor="#F6C86E" android:pathData="M55,42 C51,36 42,39 42,48 C42,57 55,66 55,66 C55,66 68,57 68,48 C68,39 59,36 55,42 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M82,17 L85,24 L92,27 L85,30 L82,37 L79,30 L72,27 L79,24 Z"/>
          </vector>'''
          (drawable / 'ic_launcher_foreground.xml').write_text(foreground, encoding='utf-8')
          (drawable / 'ic_launcher_monochrome.xml').write_text(monochrome, encoding='utf-8')
          (mip / 'ic_launcher.xml').write_text(legacy, encoding='utf-8')
          (mip / 'ic_launcher_round.xml').write_text(legacy, encoding='utf-8')
          adaptive26 = '''<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/icon_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>'''
          adaptive33 = '''<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/icon_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/><monochrome android:drawable="@drawable/ic_launcher_monochrome"/></adaptive-icon>'''
          (mip26 / 'ic_launcher.xml').write_text(adaptive26, encoding='utf-8')
          (mip26 / 'ic_launcher_round.xml').write_text(adaptive26, encoding='utf-8')
          (mip33 / 'ic_launcher.xml').write_text(adaptive33, encoding='utf-8')
          (mip33 / 'ic_launcher_round.xml').write_text(adaptive33, encoding='utf-8')

          manifest = '''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="false" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:roundIcon="@mipmap/ic_launcher_round" android:supportsRtl="true" android:theme="@style/Theme.Baynana">
              <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>'''
          (project / 'app/src/main/AndroidManifest.xml').write_text(manifest, encoding='utf-8')
          PY

      - name: Test and build APK
        working-directory: BaynanaAndroid
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Prepare artifact
        run: |
          cp BaynanaAndroid/app/build/outputs/apk/debug/app-debug.apk Baynana-v6.0-debug.apk
          sha256sum Baynana-v6.0-debug.apk > Baynana-v6.0-debug.apk.sha256
          unzip -t Baynana-v6.0-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-v6-APK
          path: |
            Baynana-v6.0-debug.apk
            Baynana-v6.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
