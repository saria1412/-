name: Build Baynana APK

on:
  push:
    branches:
      - baynana-apk-build-20260712
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Reconstruct and extract project
        run: |
          cat \
            build-input/baynana.part.00 \
            build-input/baynana.part.01 \
            build-input/baynana.part.02 \
            build-input/baynana.p03a \
            build-input/baynana.p03b \
            build-input/baynana.p03c \
            build-input/baynana.p03d \
            build-input/baynana.part.04a \
            build-input/baynana.part.04b \
            build-input/baynana.part.04c \
            > Baynana_Android_MVP_Source.b64
          test "$(wc -c < Baynana_Android_MVP_Source.b64)" -eq 47188
          echo "091a9ce2fda3458843fec1f56d62e5e500be678d211afe0a58841042907c9d81  Baynana_Android_MVP_Source.b64" | sha256sum -c -
          base64 -d Baynana_Android_MVP_Source.b64 > Baynana_Android_MVP_Source.zip
          echo "0efbdc9c1c14f4edcad2148e49c70123c22660087f0e44398e6b5e501695db15  Baynana_Android_MVP_Source.zip" | sha256sum -c -
          unzip -q Baynana_Android_MVP_Source.zip

      - name: Build debug APK
        working-directory: BaynanaAndroid
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Prepare APK
        run: |
          cp BaynanaAndroid/app/build/outputs/apk/debug/app-debug.apk Baynana.apk
          sha256sum Baynana.apk > Baynana.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-APK
          path: |
            Baynana.apk
            Baynana.apk.sha256
          if-no-files-found: error
          retention-days: 7
