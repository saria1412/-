name: Build Baynana APK

on:
  push:
    branches:
      - baynana-apk-build-20260712
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build debug APK
        working-directory: LiteApp
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Prepare APK
        run: |
          cp LiteApp/app/build/outputs/apk/debug/app-debug.apk Baynana.apk
          sha256sum Baynana.apk > Baynana.apk.sha256
          unzip -t Baynana.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-APK
          path: |
            Baynana.apk
            Baynana.apk.sha256
          if-no-files-found: error
          retention-days: 7
