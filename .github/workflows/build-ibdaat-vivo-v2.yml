name: Build Ibdaat Duma v1.1.0 Vivo APK

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'ibdaat-duma-vivo-v2'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore and verify source package
        run: |
          sha256sum ci/ibdaat-v2.part* | tee part_hashes.txt
          cat ci/ibdaat-v2.part* | base64 --decode > /tmp/IbdaatDuma_Android_v1.1.0_Source.zip
          sha256sum /tmp/IbdaatDuma_Android_v1.1.0_Source.zip | tee reconstructed_hash.txt
          echo "b2a4810952d85d01f0763b31ed97db4459ebab3d048e9591b2f5bb4fe2a8c327  /tmp/IbdaatDuma_Android_v1.1.0_Source.zip" | sha256sum -c -
          unzip -q /tmp/IbdaatDuma_Android_v1.1.0_Source.zip
          test -f IbdaatDuma_Android/app/src/main/assets/calculator.html
          test -f IbdaatDuma_Android/app/src/main/java/com/ibdaatduma/cartoncost/MainActivity.java
          grep -F "70 × 50" IbdaatDuma_Android/app/src/main/assets/calculator.html
          grep -F "class AndroidBridge" IbdaatDuma_Android/app/src/main/java/com/ibdaatduma/cartoncost/MainActivity.java

      - name: Install Android SDK components
        run: |
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: IbdaatDuma_Android
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Ibdaat-Duma-v1.1.0-Build-Diagnostics
          path: |
            part_hashes.txt
            reconstructed_hash.txt
            IbdaatDuma_Android/app/build/reports
            IbdaatDuma_Android/app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 2

      - name: Verify APK
        run: |
          cp IbdaatDuma_Android/app/build/outputs/apk/debug/app-debug.apk Ibdaat-Duma-v1.1.0-Vivo-debug.apk
          unzip -t Ibdaat-Duma-v1.1.0-Vivo-debug.apk
          sha256sum Ibdaat-Duma-v1.1.0-Vivo-debug.apk > Ibdaat-Duma-v1.1.0-Vivo-debug.apk.sha256
          (cd IbdaatDuma_Android && zip -qr ../IbdaatDuma-Android-v1.1.0-Source.zip . -x 'app/build/*' '.gradle/*' 'build/*')

      - name: Upload APK and source
        uses: actions/upload-artifact@v4
        with:
          name: Ibdaat-Duma-v1.1.0-Vivo-APK
          path: |
            Ibdaat-Duma-v1.1.0-Vivo-debug.apk
            Ibdaat-Duma-v1.1.0-Vivo-debug.apk.sha256
            IbdaatDuma-Android-v1.1.0-Source.zip
          if-no-files-found: error
          retention-days: 7
