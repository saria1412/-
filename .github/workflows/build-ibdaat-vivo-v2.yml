name: Build Ibdaat Duma v1.1.3 Fixed APK

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'ibdaat-duma-vivo-v2'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore and patch source
        shell: bash
        run: |
          set -euxo pipefail
          cat ci/ibdaat-v2.part00 ci/ibdaat-v2.part01 ci/ibdaat-v2.part02 ci/ibdaat-v2.part03 ci/ibdaat-v2.part040 ci/ibdaat-v2.part041 ci/ibdaat-v2.part042 ci/ibdaat-v2.part05 | base64 --decode > /tmp/IbdaatDuma_Android_v1.1.0_Source.zip
          echo "b2a4810952d85d01f0763b31ed97db4459ebab3d048e9591b2f5bb4fe2a8c327  /tmp/IbdaatDuma_Android_v1.1.0_Source.zip" | sha256sum -c -
          unzip -q /tmp/IbdaatDuma_Android_v1.1.0_Source.zip
          python3 ci/patch-ibdaat-v112.py IbdaatDuma_Android
          python3 ci/patch-ibdaat-v113.py IbdaatDuma_Android
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('IbdaatDuma_Android/app/src/main/res/values/styles.xml')
          s=p.read_text(encoding='utf-8')
          s=s.replace('<style name="TextAppearance.Duma" />','<style name="TextAppearance.Duma" parent="" />')
          s=s.replace('<style name="Widget.Duma" />','<style name="Widget.Duma" parent="" />')
          p.write_text(s,encoding='utf-8')
          h=Path('IbdaatDuma_Android/app/src/main/assets/calculator.html').read_text(encoding='utf-8')
          scripts='\n'.join(re.findall(r'<script[^>]*>(.*?)</script>',h,re.S))
          Path('/tmp/calculator.js').write_text(scripts,encoding='utf-8')
          PY
          node --check /tmp/calculator.js
          grep -F 'إعدادات الأسعار' IbdaatDuma_Android/app/src/main/assets/calculator.html
          grep -F 'DEFAULT_PRICING' IbdaatDuma_Android/app/src/main/assets/calculator.html
          grep -F 'فرق المعادلة' IbdaatDuma_Android/app/src/main/assets/calculator.html
          grep -F 'saveCalculatorSettings' IbdaatDuma_Android/app/src/main/java/com/ibdaatduma/cartoncost/MainActivity.java
          grep -F 'versionName = "1.1.3"' IbdaatDuma_Android/app/build.gradle.kts

      - name: Install Android SDK components
        run: |
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;35.0.0"

      - name: Build APK
        working-directory: IbdaatDuma_Android
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Verify APK and modern signing
        run: |
          cp IbdaatDuma_Android/app/build/outputs/apk/debug/app-debug.apk Ibdaat-Duma-v1.1.3-Fixed.apk
          unzip -t Ibdaat-Duma-v1.1.3-Fixed.apk
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" verify --verbose --print-certs Ibdaat-Duma-v1.1.3-Fixed.apk | tee signing-verification.txt
          grep -F 'Verified using v2 scheme (APK Signature Scheme v2): true' signing-verification.txt
          sha256sum Ibdaat-Duma-v1.1.3-Fixed.apk > Ibdaat-Duma-v1.1.3-Fixed.apk.sha256
          (cd IbdaatDuma_Android && zip -qr ../IbdaatDuma-Android-v1.1.3-Fixed-Source.zip . -x 'app/build/*' '.gradle/*' 'build/*')

      - name: Upload APK and source
        uses: actions/upload-artifact@v4
        with:
          name: Ibdaat-Duma-v1.1.3-Fixed-APK
          path: |
            Ibdaat-Duma-v1.1.3-Fixed.apk
            Ibdaat-Duma-v1.1.3-Fixed.apk.sha256
            signing-verification.txt
            IbdaatDuma-Android-v1.1.3-Fixed-Source.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Ibdaat-Duma-v1.1.3-Fixed-Diagnostics
          path: |
            /tmp/calculator.js
            IbdaatDuma_Android/app/build/reports
            IbdaatDuma_Android/app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 2
