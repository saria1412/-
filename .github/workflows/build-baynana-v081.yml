name: Build Baynana v0.8.1 APK

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'baynana-v081-*'

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore verified v0.8.0 source artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -H 'Accept: application/vnd.github+json' /repos/${{ github.repository }}/actions/artifacts/8264420358/zip > /tmp/v8-artifact.zip
          mkdir -p /tmp/v8-artifact BaynanaAndroid
          unzip -q /tmp/v8-artifact.zip -d /tmp/v8-artifact
          unzip -q /tmp/v8-artifact/Baynana-v0.8.0-source.zip -d BaynanaAndroid
          test -f BaynanaAndroid/app/src/main/java/com/baynana/couplesgame/MainActivity.kt
          test -f BaynanaAndroid/app/src/main/java/com/baynana/couplesgame/BaynanaApp.kt

      - name: Apply responsive scrolling fix
        run: |
          python3 ci/fix-baynana-v081.py BaynanaAndroid
          grep -F '.verticalScroll(playScrollState)' BaynanaAndroid/app/src/main/java/com/baynana/couplesgame/BaynanaApp.kt
          grep -F 'playScrollState.scrollTo(0)' BaynanaAndroid/app/src/main/java/com/baynana/couplesgame/BaynanaApp.kt
          grep -F 'heightIn(min = 430.dp)' BaynanaAndroid/app/src/main/java/com/baynana/couplesgame/BaynanaApp.kt

      - name: Test and build APK
        working-directory: BaynanaAndroid
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Verify package
        run: |
          cp BaynanaAndroid/app/build/outputs/apk/debug/app-debug.apk Baynana-v0.8.1-debug.apk
          unzip -t Baynana-v0.8.1-debug.apk
          rm -rf /tmp/baynana-dex && mkdir -p /tmp/baynana-dex
          unzip -q Baynana-v0.8.1-debug.apk 'classes*.dex' -d /tmp/baynana-dex
          strings /tmp/baynana-dex/classes*.dex > /tmp/baynana-dex-strings.txt
          grep -F 'MainActivity' /tmp/baynana-dex-strings.txt
          sha256sum Baynana-v0.8.1-debug.apk > Baynana-v0.8.1-debug.apk.sha256
          (cd BaynanaAndroid && zip -qr ../Baynana-v0.8.1-source.zip . -x 'app/build/*' '.gradle/*' 'build/*')

      - name: Upload APK and source
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-v081-APK
          path: |
            Baynana-v0.8.1-debug.apk
            Baynana-v0.8.1-debug.apk.sha256
            Baynana-v0.8.1-source.zip
          if-no-files-found: error
          retention-days: 7
