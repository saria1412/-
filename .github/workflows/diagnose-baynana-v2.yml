name: Diagnose Baynana v2 APK

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build and capture log
        run: bash ci/build-v2.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-v2-build-log
          path: gradle-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-v2-APK
          path: |
            Baynana-v2.0-debug.apk
            Baynana-v2.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
