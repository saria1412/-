name: Build Baynana v7 APK

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore tested Android project
        run: bash ci/build-v2.sh

      - name: Apply intimate v7 edition
        run: |
          base64 -d overlay/v7.patch.gz.b64 > /tmp/baynana-v7.patch.gz
          echo 'b03c3d3a9b94e9b0eeebb2d5688fe31323807060cc78432d346f84bbc263fa7e  /tmp/baynana-v7.patch.gz' | sha256sum -c -
          gunzip -c /tmp/baynana-v7.patch.gz > /tmp/baynana-v7.patch
          echo '888e182b9def25da4ee9d55235c7d6e1960b628421f1bc9c5efcaff973294fd7  /tmp/baynana-v7.patch' | sha256sum -c -
          (cd overlay && patch -p1 --forward < /tmp/baynana-v7.patch)

          rm -rf BaynanaAndroid/app/src/main/java/com/baynana/couplesgame
          mkdir -p BaynanaAndroid/app/src/main/java/com/baynana
          cp -R overlay/app/src/main/java/com/baynana/couplesgame BaynanaAndroid/app/src/main/java/com/baynana/
          rm -rf BaynanaAndroid/app/src/test/java/com/baynana/couplesgame
          mkdir -p BaynanaAndroid/app/src/test/java/com/baynana
          cp -R overlay/app/src/test/java/com/baynana/couplesgame BaynanaAndroid/app/src/test/java/com/baynana/

          python3 - <<'PY'
          from pathlib import Path
          import re

          project = Path('BaynanaAndroid')
          gradle = project / 'app/build.gradle.kts'
          text = gradle.read_text(encoding='utf-8')
          text = re.sub(r'versionCode\s*=\s*\d+', 'versionCode = 7', text)
          text = re.sub(r'versionName\s*=\s*"[^"]+"', 'versionName = "0.7.0"', text)
          text = text.replace('jvmTarget = "11"', 'jvmTarget = "17"').replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17')
          gradle.write_text(text, encoding='utf-8')

          values = project / 'app/src/main/res/values'
          drawable = project / 'app/src/main/res/drawable'
          mip = project / 'app/src/main/res/mipmap-anydpi'
          mip26 = project / 'app/src/main/res/mipmap-anydpi-v26'
          mip33 = project / 'app/src/main/res/mipmap-anydpi-v33'
          for directory in (values, drawable, mip, mip26, mip33):
              directory.mkdir(parents=True, exist_ok=True)

          (values / 'strings.xml').write_text('<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">بيننا</string></resources>', encoding='utf-8')
          (values / 'colors.xml').write_text('<?xml version="1.0" encoding="utf-8"?><resources><color name="icon_background">#210A17</color></resources>', encoding='utf-8')
          (values / 'styles.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>
          <resources><style name="Theme.Baynana" parent="android:style/Theme.Material.Light.NoActionBar"><item name="android:fontFamily">sans</item><item name="android:windowLightStatusBar">false</item><item name="android:statusBarColor">@android:color/transparent</item><item name="android:navigationBarColor">@android:color/transparent</item></style></resources>''', encoding='utf-8')

          foreground = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="@android:color/transparent" android:strokeColor="#FFF8F3" android:strokeWidth="8" android:strokeLineCap="round" android:strokeLineJoin="round" android:pathData="M22,49 C22,31 35,22 47,29 C51,31 54,35 57,40 C60,35 64,31 69,29 C82,23 94,33 92,50 C90,67 73,79 54,91 C35,79 20,67 22,49 Z"/>
            <path android:fillColor="@android:color/transparent" android:strokeColor="#F5C96F" android:strokeWidth="5" android:strokeLineCap="round" android:pathData="M28,52 C37,40 46,40 54,52 C62,64 71,64 80,52"/>
            <path android:fillColor="#F29AB4" android:pathData="M54,45 C50,39 41,42 41,50 C41,59 54,67 54,67 C54,67 67,59 67,50 C67,42 58,39 54,45 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M81,19 L84,26 L91,29 L84,32 L81,39 L78,32 L71,29 L78,26 Z"/>
          </vector>'''
          mono = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="@android:color/transparent" android:strokeColor="#FFFFFFFF" android:strokeWidth="8" android:strokeLineCap="round" android:strokeLineJoin="round" android:pathData="M22,49 C22,31 35,22 47,29 C51,31 54,35 57,40 C60,35 64,31 69,29 C82,23 94,33 92,50 C90,67 73,79 54,91 C35,79 20,67 22,49 Z"/>
            <path android:fillColor="@android:color/transparent" android:strokeColor="#FFFFFFFF" android:strokeWidth="5" android:strokeLineCap="round" android:pathData="M28,52 C37,40 46,40 54,52 C62,64 71,64 80,52"/>
            <path android:fillColor="#FFFFFFFF" android:pathData="M54,45 C50,39 41,42 41,50 C41,59 54,67 54,67 C54,67 67,59 67,50 C67,42 58,39 54,45 Z"/>
          </vector>'''
          legacy = '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#210A17" android:pathData="M13,4 H95 C101,4 104,7 104,13 V95 C104,101 101,104 95,104 H13 C7,104 4,101 4,95 V13 C4,7 7,4 13,4 Z"/>
            <path android:fillColor="@android:color/transparent" android:strokeColor="#FFF8F3" android:strokeWidth="8" android:strokeLineCap="round" android:strokeLineJoin="round" android:pathData="M22,49 C22,31 35,22 47,29 C51,31 54,35 57,40 C60,35 64,31 69,29 C82,23 94,33 92,50 C90,67 73,79 54,91 C35,79 20,67 22,49 Z"/>
            <path android:fillColor="@android:color/transparent" android:strokeColor="#F5C96F" android:strokeWidth="5" android:strokeLineCap="round" android:pathData="M28,52 C37,40 46,40 54,52 C62,64 71,64 80,52"/>
            <path android:fillColor="#F29AB4" android:pathData="M54,45 C50,39 41,42 41,50 C41,59 54,67 54,67 C54,67 67,59 67,50 C67,42 58,39 54,45 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M81,19 L84,26 L91,29 L84,32 L81,39 L78,32 L71,29 L78,26 Z"/>
          </vector>'''
          (drawable / 'ic_launcher_foreground.xml').write_text(foreground, encoding='utf-8')
          (drawable / 'ic_launcher_monochrome.xml').write_text(mono, encoding='utf-8')
          (mip / 'ic_launcher.xml').write_text(legacy, encoding='utf-8')
          (mip / 'ic_launcher_round.xml').write_text(legacy, encoding='utf-8')
          adaptive26 = '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/icon_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>'
          adaptive33 = '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/icon_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/><monochrome android:drawable="@drawable/ic_launcher_monochrome"/></adaptive-icon>'
          (mip26 / 'ic_launcher.xml').write_text(adaptive26, encoding='utf-8')
          (mip26 / 'ic_launcher_round.xml').write_text(adaptive26, encoding='utf-8')
          (mip33 / 'ic_launcher.xml').write_text(adaptive33, encoding='utf-8')
          (mip33 / 'ic_launcher_round.xml').write_text(adaptive33, encoding='utf-8')

          manifest = '''<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:allowBackup="false" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:roundIcon="@mipmap/ic_launcher_round" android:supportsRtl="true" android:theme="@style/Theme.Baynana"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>'''
          (project / 'app/src/main/AndroidManifest.xml').write_text(manifest, encoding='utf-8')
          PY

      - name: Test and build APK
        working-directory: BaynanaAndroid
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Prepare artifacts
        run: |
          cp BaynanaAndroid/app/build/outputs/apk/debug/app-debug.apk Baynana-v0.7.0-debug.apk
          sha256sum Baynana-v0.7.0-debug.apk > Baynana-v0.7.0-debug.apk.sha256
          unzip -t Baynana-v0.7.0-debug.apk
          (cd BaynanaAndroid && zip -qr ../Baynana-v0.7.0-source.zip . -x 'app/build/*' '.gradle/*' 'build/*')

      - name: Upload APK and source
        uses: actions/upload-artifact@v4
        with:
          name: Baynana-v7-APK
          path: |
            Baynana-v0.7.0-debug.apk
            Baynana-v0.7.0-debug.apk.sha256
            Baynana-v0.7.0-source.zip
          if-no-files-found: error
          retention-days: 7
