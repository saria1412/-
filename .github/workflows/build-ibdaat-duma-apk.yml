name: Build Ibdaat Duma APK

on:
  push:
    branches:
      - 'ibdaat-duma-apk-*'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore source package
        run: |
          cat ci/ibdaat-source.part* | base64 --decode > /tmp/IbdaatDuma_Android_Source.zip
          echo "382e1c2ed5a61c39517b6e48c23960d6aa4d5c613137b0ec4dd75006c657838c  /tmp/IbdaatDuma_Android_Source.zip" | sha256sum -c -
          unzip -q /tmp/IbdaatDuma_Android_Source.zip
          test -f IbdaatDuma_Android/app/src/main/java/com/ibdaatduma/cartoncost/MainActivity.java

      - name: Install Android SDK components
        run: |
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: IbdaatDuma_Android
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Verify APK
        run: |
          cp IbdaatDuma_Android/app/build/outputs/apk/debug/app-debug.apk Ibdaat-Duma-v1.0.0-debug.apk
          unzip -t Ibdaat-Duma-v1.0.0-debug.apk
          sha256sum Ibdaat-Duma-v1.0.0-debug.apk > Ibdaat-Duma-v1.0.0-debug.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ibdaat-Duma-APK
          path: |
            Ibdaat-Duma-v1.0.0-debug.apk
            Ibdaat-Duma-v1.0.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
